<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Coming soon…</title>
		<meta name="description" content="Something new is on the way." />
		<style>
			:root {
				--bg: #0b0d10;
				--fg: #f2f3f5;
				--muted: #8a8f98;
				--accent: #6ea8fe;
			}

			* { box-sizing: border-box; }

			html, body {
				height: 100%;
				margin: 0;
			}

			body {
				display: flex;
				align-items: center;
				justify-content: center;
				min-height: 100vh;
				padding: 2rem;
				background: radial-gradient(120% 120% at 50% 0%, #12161c 0%, var(--bg) 55%);
				color: var(--fg);
				font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
				text-align: center;
				-webkit-font-smoothing: antialiased;
			}

			main {
				max-width: 32rem;
				animation: rise 0.9s cubic-bezier(0.16, 1, 0.3, 1) both;
			}

			h1 {
				margin: 0;
				font-size: clamp(2.25rem, 8vw, 4rem);
				font-weight: 600;
				letter-spacing: -0.02em;
			}

			h1 .dots::after {
				content: "";
				animation: dots 1.6s steps(4, end) infinite;
			}

			p {
				margin: 1.25rem 0 0;
				font-size: 1.05rem;
				line-height: 1.6;
				color: var(--muted);
			}

			.rule {
				width: 3rem;
				height: 2px;
				margin: 2rem auto 0;
				border-radius: 2px;
				background: linear-gradient(90deg, transparent, var(--accent), transparent);
			}

			@keyframes rise {
				from { opacity: 0; transform: translateY(12px); }
				to { opacity: 1; transform: translateY(0); }
			}

			@keyframes dots {
				0%   { content: ""; }
				25%  { content: "."; }
				50%  { content: ".."; }
				75%  { content: "..."; }
				100% { content: ""; }
			}

			@media (prefers-reduced-motion: reduce) {
				main { animation: none; }
				h1 .dots::after { content: "…"; animation: none; }
			}
		</style>
	</head>
	<body>
		<main>
			<h1>Coming soon<span class="dots"></span></h1>
			<p>Something new is on the way. Check back shortly.</p>
			<div class="rule"></div>
		</main>
	</body>
</html>
